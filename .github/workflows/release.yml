name: Release

on:
  push:
    tags:
      # Semantic version tags: v1.0.0, v2.1.3, etc.
      - 'v*.*.*'
      # Also support tags without 'v' prefix: 1.0.0, 2.1.3, etc.
      - '*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.repository_owner == 'centennial-oss'
    runs-on: macos-14  # Minimum supported macOS; Apple Silicon runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Validate required secrets are present
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVID_CERT_BASE64: ${{ secrets.APPLE_DEVID_CERT_BASE64 }}
          APPLE_DIST_APP_CERT_BASE64: ${{ secrets.APPLE_DIST_APP_CERT_BASE64 }}
          APPLE_DIST_INSTALLER_CERT_BASE64: ${{ secrets.APPLE_DIST_INSTALLER_CERT_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          set -euo pipefail
          REQUIRED_VARS=(
            APPLE_TEAM_ID
            APPLE_DEVID_CERT_BASE64
            APPLE_DIST_APP_CERT_BASE64
            APPLE_DIST_INSTALLER_CERT_BASE64
            APPLE_CERTIFICATE_PASSWORD
            KEYCHAIN_PASSWORD
            APPLE_SIGNING_IDENTITY
            APP_STORE_CONNECT_KEY_ID
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_API_KEY
          )
          for var in "${REQUIRED_VARS[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret/value: $var"
              exit 1
            fi
          done

      - name: Set version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          {
            printf 'MARKETING_VERSION = %s\n' "$VERSION"
            printf 'CURRENT_PROJECT_VERSION = %s\n' "$BUILD_NUMBER"
            printf 'INFOPLIST_KEY_NSHumanReadableCopyright = Copyright © 2026 Centennial OSS\n'
          } > "ClipboardEnvy/Version.xcconfig"

      - name: Generate build info
        run: |
          COMMIT="${{ github.sha }}" \
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")" \
          CONFIG="Release" \
          ARCH="arm64" \
          make generate-build-info

      - name: Build Clipboard Envy for direct distribution (GitHub release)
        run: |
          xcodebuild -scheme ClipboardEnvy \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="-" \
            clean build

      - name: Import signing certificates
        env:
          APPLE_DEVID_CERT_BASE64: ${{ secrets.APPLE_DEVID_CERT_BASE64 }}
          APPLE_DIST_APP_CERT_BASE64: ${{ secrets.APPLE_DIST_APP_CERT_BASE64 }}
          APPLE_DIST_INSTALLER_CERT_BASE64: ${{ secrets.APPLE_DIST_INSTALLER_CERT_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security list-keychains -d user -s build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$APPLE_DEVID_CERT_BASE64" | base64 --decode > devid.p12
          echo "$APPLE_DIST_APP_CERT_BASE64" | base64 --decode > dist_app.p12
          echo "$APPLE_DIST_INSTALLER_CERT_BASE64" | base64 --decode > dist_installer.p12
          for p12 in devid.p12 dist_app.p12 dist_installer.p12; do
            security import "$p12" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/xcodebuild
          done
          rm devid.p12 dist_app.p12 dist_installer.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Validate signing identities in CI keychain
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          # Code-signing identities (Developer ID, Apple/3rd-party distribution app certs)
          security find-identity -v -p codesigning build.keychain | tee codesign-identities.txt
          # All identities including installer/package certs (not returned by -p codesigning)
          security find-identity -v build.keychain | tee all-identities.txt
          echo "--- codesigning identities ---"
          cat codesign-identities.txt
          echo "--- all identities ---"
          cat all-identities.txt
          if ! grep -F "$APPLE_SIGNING_IDENTITY" codesign-identities.txt > /dev/null; then
            echo "::error::APPLE_SIGNING_IDENTITY not found in build.keychain: $APPLE_SIGNING_IDENTITY"
            exit 1
          fi
          if ! grep -E "Developer ID Application" codesign-identities.txt > /dev/null; then
            echo "::error::No Developer ID Application identity found in imported certificates."
            exit 1
          fi
          if ! grep -E "Apple Distribution|Distribution Managed|3rd Party Mac Developer Application" codesign-identities.txt > /dev/null; then
            echo "::error::No Apple Distribution/3rd Party Mac Developer Application identity found in imported certificates."
            exit 1
          fi
          if ! grep -E "Mac Installer Distribution|3rd Party Mac Developer Installer" all-identities.txt > /dev/null; then
            echo "::error::No Mac Installer Distribution/3rd Party Mac Developer Installer identity found in imported certificates."
            exit 1
          fi

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode \
            > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Code sign app (Developer ID - for GitHub release)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="build/Build/Products/Release/Clipboard Envy.app"
          XCENT="build/Build/Intermediates.noindex/ClipboardEnvy.build/Release/ClipboardEnvy.build/Clipboard Envy.app.xcent"
          ENTITLEMENTS="build/Release.entitlements"
          cp "$XCENT" "$ENTITLEMENTS"
          # get-task-allow is for debugging only; must be false for notarization
          /usr/libexec/PlistBuddy -c "Set :com.apple.security.get-task-allow false" "$ENTITLEMENTS"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            "$APP_PATH"
          codesign --verify --verbose "$APP_PATH"

      - name: Notarize app (GitHub release)
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --key ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID"
          cd build/Build/Products/Release
          ditto -c -k --keepParent "Clipboard Envy.app" notarization.zip
          SUBMIT_OUTPUT=$(xcrun notarytool submit notarization.zip --keychain-profile "notarytool-profile" --wait 2>&1)
          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization was rejected (Invalid). Submission ID: $SUBMISSION_ID"
            echo "--- Notarization log ---"
            xcrun notarytool log "$SUBMISSION_ID" --keychain-profile "notarytool-profile" || true
            echo "--- End log ---"
            exit 1
          fi
          xcrun stapler staple "Clipboard Envy.app"
          rm notarization.zip

      - name: Prepare release asset
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cd build/Build/Products/Release
          zip -r "ClipboardEnvy-${VERSION}-macOS-universal.zip" "Clipboard Envy.app"
          mv "ClipboardEnvy-${VERSION}-macOS-universal.zip" "$GITHUB_WORKSPACE/"

      - name: Archive for Mac App Store
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -scheme ClipboardEnvy \
            -configuration Release \
            -archivePath build/ClipboardEnvy.xcarchive \
            -destination 'generic/platform=macOS' \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Export and upload to App Store Connect
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          /usr/libexec/PlistBuddy \
            -c "Add :method string app-store-connect" \
            -c "Add :destination string upload" \
            -c "Add :signingStyle string automatic" \
            -c "Add :teamID string $APPLE_TEAM_ID" \
            /tmp/ExportOptions-CI.plist
          xcodebuild -exportArchive \
            -archivePath build/ClipboardEnvy.xcarchive \
            -exportPath build/AppStoreExport \
            -exportOptionsPlist /tmp/ExportOptions-CI.plist \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClipboardEnvy-*-macOS-universal.zip
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
