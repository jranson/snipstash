name: Release

on:
  push:
    tags:
      # Semantic version tags: v1.0.0, v2.1.3, etc.
      - 'v*.*.*'
      # Also support tags without 'v' prefix: 1.0.0, 2.1.3, etc.
      - '*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14  # Minimum supported macOS; Apple Silicon runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Set version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          printf 'MARKETING_VERSION = %s\nINFOPLIST_KEY_NSHumanReadableCopyright = Copyright © 2026 Centennial OSS\n' "$VERSION" > Clipboard Envy/Version.xcconfig

      - name: Generate build info
        run: |
          COMMIT="${{ github.sha }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          CONFIG="Release"
          ARCH="arm64"
          printf '// Generated by Run Script - do not edit\nenum BuildInfoGenerated {\n    static let buildCommit = "%s"\n    static let buildDate = "%s"\n    static let buildConfiguration = "%s"\n    static let buildArch = "%s"\n}\n' "$COMMIT" "$DATE" "$CONFIG" "$ARCH" > ClipboardEnvy/BuildInfo.generated.swift

      - name: Build Clipboard Envy (macOS Apple Silicon)
        run: |
          xcodebuild -scheme ClipboardEnvy \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="-" \
            clean build

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Code sign app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="build/Build/Products/Release/Clipboard Envy.app"
          XCENT="build/Build/Intermediates.noindex/ClipboardEnvy.build/Release/ClipboardEnvy.build/Clipboard Envy.app.xcent"
          ENTITLEMENTS="build/Release.entitlements"
          cp "$XCENT" "$ENTITLEMENTS"
          # get-task-allow is for debugging only; must be false for notarization
          /usr/libexec/PlistBuddy -c "Set :com.apple.security.get-task-allow false" "$ENTITLEMENTS"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            "$APP_PATH"
          codesign --verify --verbose "$APP_PATH"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"
          cd build/Build/Products/Release
          ditto -c -k --keepParent "Clipboard Envy.app" notarization.zip
          SUBMIT_OUTPUT=$(xcrun notarytool submit notarization.zip --keychain-profile "notarytool-profile" --wait 2>&1)
          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization was rejected (Invalid). Submission ID: $SUBMISSION_ID"
            echo "--- Notarization log ---"
            xcrun notarytool log "$SUBMISSION_ID" --keychain-profile "notarytool-profile" || true
            echo "--- End log ---"
            exit 1
          fi
          xcrun stapler staple "Clipboard Envy.app"
          rm notarization.zip

      - name: Prepare release asset
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cd build/Build/Products/Release
          zip -r "ClipboardEnvy-${VERSION}-macOS-universal.zip" "Clipboard Envy.app"
          mv "ClipboardEnvy-${VERSION}-macOS-universal.zip" "$GITHUB_WORKSPACE/"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClipboardEnvy-*-macOS-universal.zip
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
