name: Release Preflight

on:
  workflow_dispatch:

jobs:
  preflight:
    if: github.repository_owner == 'centennial-oss' && github.ref_name == 'main'
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Validate required secrets are present
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVID_CERT_BASE64: ${{ secrets.APPLE_DEVID_CERT_BASE64 }}
          APPLE_DIST_APP_CERT_BASE64: ${{ secrets.APPLE_DIST_APP_CERT_BASE64 }}
          APPLE_DIST_INSTALLER_CERT_BASE64: ${{ secrets.APPLE_DIST_INSTALLER_CERT_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          set -euo pipefail
          REQUIRED_VARS=(
            APPLE_TEAM_ID
            APPLE_DEVID_CERT_BASE64
            APPLE_DIST_APP_CERT_BASE64
            APPLE_DIST_INSTALLER_CERT_BASE64
            APPLE_CERTIFICATE_PASSWORD
            KEYCHAIN_PASSWORD
            APPLE_SIGNING_IDENTITY
            APP_STORE_CONNECT_KEY_ID
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_API_KEY
          )
          for var in "${REQUIRED_VARS[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret/value: $var"
              exit 1
            fi
          done

      - name: Set synthetic version/build for preflight
        run: |
          VERSION="0.0.0-preflight"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          {
            printf 'MARKETING_VERSION = %s\n' "$VERSION"
            printf 'CURRENT_PROJECT_VERSION = %s\n' "$BUILD_NUMBER"
            printf 'INFOPLIST_KEY_NSHumanReadableCopyright = Copyright © 2026 Centennial OSS\n'
          } > "ClipboardEnvy/Version.xcconfig"

      - name: Generate build info
        run: |
          COMMIT="${{ github.sha }}" \
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")" \
          CONFIG="Release" \
          ARCH="arm64" \
          make generate-build-info

      - name: Import signing certificates
        env:
          APPLE_DEVID_CERT_BASE64: ${{ secrets.APPLE_DEVID_CERT_BASE64 }}
          APPLE_DIST_APP_CERT_BASE64: ${{ secrets.APPLE_DIST_APP_CERT_BASE64 }}
          APPLE_DIST_INSTALLER_CERT_BASE64: ${{ secrets.APPLE_DIST_INSTALLER_CERT_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security list-keychains -d user -s build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$APPLE_DEVID_CERT_BASE64" | base64 --decode > devid.p12
          echo "$APPLE_DIST_APP_CERT_BASE64" | base64 --decode > dist_app.p12
          echo "$APPLE_DIST_INSTALLER_CERT_BASE64" | base64 --decode > dist_installer.p12
          for p12 in devid.p12 dist_app.p12 dist_installer.p12; do
            security import "$p12" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/xcodebuild
          done
          rm devid.p12 dist_app.p12 dist_installer.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Validate signing identities in CI keychain
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          # Code-signing identities (Developer ID, Apple/3rd-party distribution app certs)
          security find-identity -v -p codesigning build.keychain | tee codesign-identities.txt
          # All identities including installer/package certs (not returned by -p codesigning)
          security find-identity -v build.keychain | tee all-identities.txt
          echo "--- codesigning identities ---"
          cat codesign-identities.txt
          echo "--- all identities ---"
          cat all-identities.txt
          if ! grep -F "$APPLE_SIGNING_IDENTITY" codesign-identities.txt > /dev/null; then
            echo "::error::APPLE_SIGNING_IDENTITY not found in build.keychain: $APPLE_SIGNING_IDENTITY"
            exit 1
          fi
          if ! grep -E "Developer ID Application" codesign-identities.txt > /dev/null; then
            echo "::error::No Developer ID Application identity found in imported certificates."
            exit 1
          fi
          if ! grep -E "Apple Distribution|Distribution Managed|3rd Party Mac Developer Application" codesign-identities.txt > /dev/null; then
            echo "::error::No Apple Distribution/3rd Party Mac Developer Application identity found in imported certificates."
            exit 1
          fi
          if ! grep -E "Mac Installer Distribution|3rd Party Mac Developer Installer" all-identities.txt > /dev/null; then
            echo "::error::No Mac Installer Distribution/3rd Party Mac Developer Installer identity found in imported certificates."
            exit 1
          fi

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode \
            > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Archive for App Store preflight
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -scheme ClipboardEnvy \
            -configuration Release \
            -archivePath build/ClipboardEnvy-preflight.xcarchive \
            -destination 'generic/platform=macOS' \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Export Mac App Store package preflight (no upload)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # signingStyle=manual: sign locally with the certs imported into the keychain,
          # not via cloud signing (which requires elevated API key permissions).
          # The provisioning profile is already embedded in the archive from the previous step.
          /usr/libexec/PlistBuddy \
            -c "Add :method string app-store-connect" \
            -c "Add :destination string export" \
            -c "Add :signingStyle string manual" \
            -c "Add :signingCertificate string 3rd Party Mac Developer Application" \
            -c "Add :installerSigningCertificate string 3rd Party Mac Developer Installer" \
            -c "Add :teamID string $APPLE_TEAM_ID" \
            /tmp/ExportOptions-preflight.plist
          # -allowProvisioningUpdates not needed: the archive already has the profile embedded.
          xcodebuild -exportArchive \
            -archivePath build/ClipboardEnvy-preflight.xcarchive \
            -exportPath build/AppStoreExport-preflight \
            -exportOptionsPlist /tmp/ExportOptions-preflight.plist

      - name: Verify exported package exists and is signed
        run: |
          set -euo pipefail
          shopt -s nullglob
          PKGS=(build/AppStoreExport-preflight/*.pkg)
          if [ ${#PKGS[@]} -eq 0 ]; then
            echo "::error::No .pkg found in build/AppStoreExport-preflight after export step."
            ls -la build/AppStoreExport-preflight || true
            exit 1
          fi
          PKG_PATH="${PKGS[0]}"
          echo "Preflight package: $PKG_PATH"
          pkgutil --check-signature "$PKG_PATH"
