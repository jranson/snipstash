name: Build macOS App Store Preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-preflight:
    if: github.repository_owner == 'centennial-oss'
    runs-on: macos-14  # Minimum supported macOS
    env:
      APP_NAME: Clipboard Envy
      SCHEME: ClipboardEnvy
      PROJECT: ClipboardEnvy.xcodeproj
      ARCHIVE_PATH: ${{ runner.temp }}/ClipboardEnvy.xcarchive
      EXPORT_PATH: ${{ runner.temp }}/export
      DERIVED_DATA_PATH: ${{ runner.temp }}/DerivedData
      KEYCHAIN_PATH: ${{ runner.temp }}/ci-signing.keychain-db
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Create and unlock temporary keychain
        shell: bash
        run: |
          set -euo pipefail
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Import signing certificates
        shell: bash
        run: |
          set -euo pipefail
          APP_CERT_PATH="$RUNNER_TEMP/app-dist.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/installer-dist.p12"
          echo "${{ secrets.APPLE_DIST_APP_CERT_BASE64 }}" | base64 --decode > "$APP_CERT_PATH"
          echo "${{ secrets.APPLE_DIST_INSTALLER_CERT_BASE64 }}" | base64 --decode > "$INSTALLER_CERT_PATH"

          security import "$APP_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild

          security import "$INSTALLER_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/productsign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s \
            -k "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"

      - name: Write App Store Connect API key
        id: asc_key
        shell: bash
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          if [[ "${{ secrets.APP_STORE_CONNECT_API_KEY }}" == *"BEGIN PRIVATE KEY"* ]]; then
            printf '%s\n' "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > "$KEY_PATH"
          else
            echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" | base64 --decode > "$KEY_PATH"
          fi
          chmod 600 "$KEY_PATH"
          cp "$KEY_PATH" "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "key_path=$KEY_PATH" >> "$GITHUB_OUTPUT"

      - name: Archive universal macOS app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.asc_key.outputs.key_path }}" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            clean archive

      - name: Export App Store package
        shell: bash
        run: |
          set -euo pipefail
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions.plist"
          cat > "$EXPORT_OPTIONS_PLIST" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.asc_key.outputs.key_path }}" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Verify exported package
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          pkgs=("$EXPORT_PATH"/*.pkg)
          if [ "${#pkgs[@]}" -eq 0 ]; then
            echo "No exported .pkg found in $EXPORT_PATH"
            exit 1
          fi
          PKG_PATH="${pkgs[0]}"
          echo "Preflight succeeded. Exported package: $PKG_PATH"

      - name: Cleanup keychain
        if: always()
        shell: bash
        run: |
          set +e
          security delete-keychain "$KEYCHAIN_PATH"
