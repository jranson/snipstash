name: Build macOS App Store Preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-preflight:
    if: github.repository_owner == 'centennial-oss'
    runs-on: macos-14  # Minimum supported macOS
    env:
      APP_NAME: Clipboard Envy
      SCHEME: ClipboardEnvy
      PROJECT: ClipboardEnvy.xcodeproj
      ARCHIVE_PATH: /tmp/ClipboardEnvy-${{ github.run_id }}-${{ github.run_attempt }}.xcarchive
      EXPORT_PATH: /tmp/export-${{ github.run_id }}-${{ github.run_attempt }}
      DERIVED_DATA_PATH: /tmp/DerivedData-${{ github.run_id }}-${{ github.run_attempt }}
      KEYCHAIN_PATH: /tmp/ci-signing-${{ github.run_id }}-${{ github.run_attempt }}.keychain-db
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_SIGNING_CERT_PREFIX: ${{ vars.APP_SIGNING_CERT_PREFIX || '3rd Party Mac Developer Application' }}
      INSTALLER_SIGNING_CERT_PREFIX: ${{ vars.INSTALLER_SIGNING_CERT_PREFIX || '3rd Party Mac Developer Installer' }}

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Create and unlock temporary keychain
        shell: bash
        run: |
          set -euo pipefail
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Import signing certificates
        shell: bash
        run: |
          set -euo pipefail
          APP_CERT_PATH="$RUNNER_TEMP/app-dist.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/installer-dist.p12"
          echo "${{ secrets.APPLE_DIST_APP_CERT_BASE64 }}" | base64 --decode > "$APP_CERT_PATH"
          echo "${{ secrets.APPLE_DIST_INSTALLER_CERT_BASE64 }}" | base64 --decode > "$INSTALLER_CERT_PATH"

          security import "$APP_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild

          security import "$INSTALLER_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/productsign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s \
            -k "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"

      - name: Verify imported signing identities
        shell: bash
        run: |
          set -euo pipefail
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          security find-identity -v -p basic "$KEYCHAIN_PATH"

      - name: Resolve signing identities from prefixes
        id: signing_identity
        shell: bash
        run: |
          set -euo pipefail
          IDENTITIES="$(security find-identity -v -p basic "$KEYCHAIN_PATH")"

          APP_IDENTITY="$(printf '%s\n' "$IDENTITIES" | awk -v p="$APP_SIGNING_CERT_PREFIX" -F'"' '$0 ~ p {print $2; exit}')"
          INSTALLER_IDENTITY="$(printf '%s\n' "$IDENTITIES" | awk -v p="$INSTALLER_SIGNING_CERT_PREFIX" -F'"' '$0 ~ p {print $2; exit}')"

          if [ -z "$APP_IDENTITY" ]; then
            echo "Could not find app signing identity with prefix: $APP_SIGNING_CERT_PREFIX"
            exit 1
          fi
          if [ -z "$INSTALLER_IDENTITY" ]; then
            echo "Could not find installer signing identity with prefix: $INSTALLER_SIGNING_CERT_PREFIX"
            exit 1
          fi

          echo "Resolved app signing identity: $APP_IDENTITY"
          echo "Resolved installer signing identity: $INSTALLER_IDENTITY"
          echo "app_identity=$APP_IDENTITY" >> "$GITHUB_OUTPUT"
          echo "installer_identity=$INSTALLER_IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Write App Store Connect API key
        id: asc_key
        shell: bash
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          if [[ "${{ secrets.APP_STORE_CONNECT_API_KEY }}" == *"BEGIN PRIVATE KEY"* ]]; then
            printf '%s\n' "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > "$KEY_PATH"
          else
            echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" | base64 --decode > "$KEY_PATH"
          fi
          chmod 600 "$KEY_PATH"
          cp "$KEY_PATH" "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "key_path=$KEY_PATH" >> "$GITHUB_OUTPUT"

      - name: Archive universal macOS app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.asc_key.outputs.key_path }}" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="${{ steps.signing_identity.outputs.app_identity }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            clean archive

      - name: Export App Store package
        shell: bash
        run: |
          set -euo pipefail
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions.plist"
          cat > "$EXPORT_OPTIONS_PLIST" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.asc_key.outputs.key_path }}" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Verify exported package
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          pkgs=("$EXPORT_PATH"/*.pkg)
          if [ "${#pkgs[@]}" -eq 0 ]; then
            echo "No exported .pkg found in $EXPORT_PATH"
            exit 1
          fi
          PKG_PATH="${pkgs[0]}"
          echo "Preflight succeeded. Exported package: $PKG_PATH"

      - name: Cleanup keychain
        if: always()
        shell: bash
        run: |
          set +e
          security delete-keychain "$KEYCHAIN_PATH"
